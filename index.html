<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexacraft - Servidor Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Orbitron',sans-serif;
    overflow-x:hidden;
    background:black;
}

/* FONDO DINÁMICO */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* CONTENIDO */
.overlay {
    text-align:center;
    padding-top:100px;
    color:white;
}

h1 {
    font-size:60px;
    text-shadow:0 0 20px #00ffcc;
}

/* BOTONES NEÓN */
.botones {
    margin-top:30px;
}

.boton {
    margin:10px;
    padding:12px 30px;
    border:2px solid #00ffcc;
    background:transparent;
    color:#00ffcc;
    cursor:pointer;
    transition:0.3s;
}

.boton:hover {
    background:#00ffcc;
    color:black;
    box-shadow:0 0 20px #00ffcc;
}

/* SERVER BOX GLASS */
.server-box {
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.server-item {
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
    padding:15px 25px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.server-item:hover {
    transform:scale(1.05);
    border-color:#00ffcc;
    box-shadow:0 0 15px #00ffcc;
}

/* MODALIDADES */
.modalidades {
    margin-top:100px;
    padding:40px;
}

.cards {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card {
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.05);
    padding:20px;
    width:250px;
    border:1px solid rgba(255,255,255,0.2);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
    box-shadow:0 0 20px #00ffcc;
}

/* TEXTO */
span { color:#aaa; font-size:12px; }
strong { font-size:18px; }

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="overlay">
<h1>MEXACRAFT</h1>

<p>Servidor premium con experiencias únicas</p>

<div class="botones">
<button class="boton" onclick="window.open('https://discord.gg/8RDbZZAAb3')">Discord</button>
<button class="boton" onclick="window.open('https://mexacraft.tebex.io/')">Tienda</button>
</div>

<div class="server-box">
<div class="server-item" onclick="copiar('mc.mexacraft.com')">
<span>IP</span>
<strong>mc.mexacraft.com</strong>
</div>

<div class="server-item" onclick="copiar('25565')">
<span>Puerto</span>
<strong>25565</strong>
</div>
</div>

</div>

<div class="modalidades">
<h2 style="text-align:center;">Modalidades</h2>

<div class="cards">
<div class="card"><h3>Survival OP</h3></div>
<div class="card"><h3>BedWars</h3></div>
<div class="card"><h3>Survival Custom</h3></div>
<div class="card"><h3>Survival Vanilla</h3></div>
</div>
</div>

<script>
function copiar(texto){
navigator.clipboard.writeText(texto);
}

/* FONDO DINÁMICO */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#00ffcc";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;
});

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
