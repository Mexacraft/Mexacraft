<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexacraft</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family:'Inter', sans-serif;
    background:#0b0f14;
    color:#eaeaea;
}

/* FONDO DINÁMICO SUAVE */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    background: radial-gradient(circle at 20% 30%, rgba(0,255,150,0.08), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0,150,255,0.08), transparent 40%);
    animation: moveBg 10s infinite alternate;
}

@keyframes moveBg {
    from { transform:translate(0,0); }
    to { transform:translate(-30px,-30px); }
}

/* CONTENEDOR */
.container {
    max-width:1100px;
    margin:auto;
    padding:80px 20px;
    text-align:center;
}

/* TITULO */
h1 {
    font-size:48px;
    font-weight:700;
}

.sub {
    margin-top:10px;
    color:#9aa4af;
}

/* BOTONES */
.actions {
    margin-top:30px;
}

.btn {
    display:inline-block;
    margin:8px;
    padding:12px 24px;
    border-radius:6px;
    border:1px solid #2a323c;
    background:#11161c;
    color:white;
    cursor:pointer;
    transition:0.25s;
}

.btn:hover {
    background:#1a222c;
    transform:translateY(-2px);
}

/* SERVER INFO */
.server {
    margin-top:50px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.server-box {
    background:#11161c;
    border:1px solid #2a323c;
    padding:20px;
    width:250px;
    border-radius:8px;
    cursor:pointer;
    transition:0.25s;
}

.server-box:hover {
    border-color:#00ff99;
    transform:translateY(-3px);
}

.server-box span {
    font-size:13px;
    color:#8a939c;
}

/* MODALIDADES */
.section {
    margin-top:80px;
}

.cards {
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:20px;
}

.card {
    background:#11161c;
    border:1px solid #2a323c;
    padding:25px;
    width:240px;
    border-radius:8px;
    transition:0.25s;
}

.card:hover {
    border-color:#00ff99;
    transform:translateY(-5px);
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
<h1>MEXACRAFT</h1>
<p class="sub">Servidor de Minecraft con modos únicos y comunidad activa</p>

<div class="actions">
<div class="btn" onclick="window.open('https://discord.gg/8RDbZZAAb3')">Discord</div>
<div class="btn" onclick="window.open('https://mexacraft.tebex.io/')">Tienda</div>
</div>

<div class="server">
<div class="server-box" onclick="copiar('mc.mexacraft.com')">
<span>IP</span>
<p>mc.mexacraft.com</p>
</div>

<div class="server-box" onclick="copiar('25565')">
<span>Puerto</span>
<p>25565</p>
</div>
</div>

<div class="section">
<h2>Modalidades</h2>

<div class="cards">
<div class="card">Survival OP</div>
<div class="card">BedWars</div>
<div class="card">Survival Custom</div>
<div class="card">Survival Vanilla</div>
</div>

</div>
</div>

<script>
function copiar(texto){
navigator.clipboard.writeText(texto);
}
</script>

</body>
</html>
