<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexacraft - Servidor Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Press Start 2P', cursive;
    overflow-x:hidden;
    color:white;
}

/* FONDO PARALLAX */
.fondo {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://wallpapercave.com/wp/wp2757874.jpg') no-repeat center;
    background-size:cover;
    z-index:-2;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

/* CONTENIDO */
.contenido {
    text-align:center;
    padding-top:100px;
}

/* TITULO */
h1 {
    font-size:30px;
    color:#00ff00;
}

/* BOTONES */
.botones {
    margin-top:30px;
}

.boton {
    display:inline-block;
    margin:10px;
    padding:15px 25px;
    background:#2ecc71;
    color:black;
    cursor:pointer;
    border:none;
    transition:0.2s;
}

.boton:hover {
    background:#27ae60;
    transform:scale(1.05);
}

/* IP BOX */
.server-box {
    margin-top:40px;
}

.server-item {
    margin:15px auto;
    padding:15px;
    background:#111;
    border:2px solid #00ff00;
    width:300px;
    cursor:pointer;
    transition:0.2s;
}

.server-item:hover {
    background:#00ff00;
    color:black;
}

/* MODALIDADES */
.modalidades {
    margin-top:100px;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card {
    background:#111;
    border:2px solid #00ff00;
    padding:20px;
    width:250px;
    transition:0.2s;
}

.card:hover {
    background:#00ff00;
    color:black;
}

</style>
</head>
<body>

<div class="fondo"></div>
<div class="overlay"></div>

<div class="contenido">
<h1>MEXACRAFT</h1>

<p>Servidor survival con modos únicos</p>

<div class="botones">
<div class="boton" onclick="window.open('https://discord.gg/8RDbZZAAb3')">Discord</div>
<div class="boton" onclick="window.open('https://mexacraft.tebex.io/')">Tienda</div>
</div>

<div class="server-box">
<div class="server-item" onclick="copiar('mc.mexacraft.com')">
IP: mc.mexacraft.com
</div>

<div class="server-item" onclick="copiar('25565')">
Puerto: 25565
</div>
</div>

<div class="modalidades">
<h2>Modalidades</h2>

<div class="cards">
<div class="card">Survival OP</div>
<div class="card">BedWars</div>
<div class="card">Survival Custom</div>
<div class="card">Survival Vanilla</div>
</div>
</div>

</div>

<script>
function copiar(texto){
navigator.clipboard.writeText(texto);
}

/* PARALLAX */
document.addEventListener("mousemove", (e) => {
const fondo = document.querySelector(".fondo");
let x = (e.clientX / window.innerWidth) * 10;
let y = (e.clientY / window.innerHeight) * 10;
fondo.style.transform = `translate(-${x}px, -${y}px) scale(1.05)`;
});
</script>

</body>
</html>
