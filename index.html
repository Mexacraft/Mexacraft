<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexacraft - Servidor Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Montserrat',sans-serif; }

/* FONDO */
#fondo {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.overlay {
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

h1 { color:white; font-size:55px; }
p { color:#ddd; }

/* BOTONES */
.botones { display:flex; gap:15px; margin-top:20px; }

.boton {
    border:2px solid white;
    background:transparent;
    color:white;
    padding:12px 25px;
    cursor:pointer;
    transition:0.3s;
}

.boton:hover {
    background:white;
    color:black;
    transform:scale(1.1);
}

/* SERVER BOX */
.server-box {
    margin-top:30px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.server-item {
    border:2px solid #ffffff;
    padding:12px 20px;
    color:white;
    cursor:pointer;
    transition:0.3s;
    min-width:220px;
}

.server-item span {
    display:block;
    font-size:12px;
    color:#aaa;
}

.server-item strong {
    font-size:16px;
}

.server-item:hover {
    background:white;
    color:black;
    transform:scale(1.05);
}

.server-item.copiado {
    background:#00ff00;
    color:black;
    border-color:#00ff00;
}

/* MODALIDADES */
.modalidades {
    background:#111;
    padding:60px 20px;
    text-align:center;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card {
    background:#1c1c1c;
    border:1px solid #333;
    padding:20px;
    width:250px;
    color:white;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}

.card::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(0,255,0,0.3),transparent);
    top:-100%;
    transition:0.5s;
}

.card:hover::before { top:100%; }
.card:hover {
    transform:translateY(-10px) scale(1.05);
    border-color:#00ff00;
}
</style>
</head>
<body>

<canvas id="fondo"></canvas>

<audio id="clickSound" src="https://www.myinstants.com/media/sounds/minecraft-click.mp3"></audio>

<div class="overlay">
<h1>MEXACRAFT</h1>

<p>Servidor oficial con modalidades únicas y comunidad activa</p>

<div class="botones">

<button class="boton" onclick="clickSound(); window.open('https://discord.gg/8RDbZZAAb3')">
Discord
</button>

<button class="boton" onclick="clickSound(); window.open('https://mexacraft.tebex.io/')">
Tienda
</button>

</div>

<!-- SERVER BOX -->
<div class="server-box">

    <div class="server-item" onclick="copiarIP(this)">
        <span>IP</span>
        <strong>mc.mexacraft.com</strong>
    </div>

    <div class="server-item" onclick="copiarPuerto(this)">
        <span>Puerto</span>
        <strong>25565</strong>
    </div>

</div>

</div>

<!-- MODALIDADES -->
<div class="modalidades">
<h2 style="color:white;">Modalidades</h2>

<div class="cards">
<div class="card"><h3>Survival OP</h3></div>
<div class="card"><h3>BedWars</h3></div>
<div class="card"><h3>Survival Custom</h3></div>
<div class="card"><h3>Survival Vanilla</h3></div>
</div>

</div>

<script>
function clickSound(){
document.getElementById("clickSound").play();
}

/* COPIAR */
function copiarIP(el){
navigator.clipboard.writeText("mc.mexacraft.com");
efecto(el);
}

function copiarPuerto(el){
navigator.clipboard.writeText("25565");
efecto(el);
}

function efecto(el){
el.classList.add("copiado");
setTimeout(()=> el.classList.remove("copiado"),1500);
}

/* FONDO */
const canvas=document.getElementById("fondo");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:Math.random()-0.5,
dy:Math.random()-0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
